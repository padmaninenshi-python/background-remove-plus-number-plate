<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARYANAMS — Gallery</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh; padding: 24px 16px; color: #fff;
}
.wrap { max-width: 1200px; margin: 0 auto; }

.header { text-align:center; margin-bottom:30px; }
.logo {
  font-size:34px; font-weight:900; letter-spacing:4px;
  background: linear-gradient(90deg, #ff6b35, #f7c948, #00d4ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.subtitle { color:#aaa; font-size:12px; margin-top:5px; letter-spacing:2px; }

.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.gallery-count {
  font-size: 13px; color: #888;
}
.gallery-count strong { color: #f7c948; font-size: 20px; }

.btn-back {
  padding: 10px 22px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.07); color: #ccc; font-size: 13px;
  font-weight: 700; cursor: pointer; text-decoration: none;
  display: inline-flex; align-items: center; gap: 7px; transition: all .2s;
}
.btn-back:hover { background: rgba(255,255,255,0.14); color: #fff; }

/* Grid */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}

.car-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.car-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.car-img-wrap {
  position: relative; width: 100%; height: 200px;
  background: #111; overflow: hidden; cursor: pointer;
}
.car-img-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .3s;
}
.car-card:hover .car-img-wrap img { transform: scale(1.04); }

.car-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0); transition: background .2s;
  display: flex; align-items: center; justify-content: center;
}
.car-card:hover .car-overlay { background: rgba(0,0,0,0.3); }
.overlay-btn {
  opacity: 0; transform: scale(0.8); transition: all .2s;
  background: rgba(255,107,53,0.9); border: none; border-radius: 50px;
  color: #fff; font-size: 12px; font-weight: 800; padding: 10px 20px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
}
.car-card:hover .overlay-btn { opacity: 1; transform: scale(1); }

.car-info {
  padding: 14px 16px;
}
.car-name {
  font-size: 13px; font-weight: 700; color: #fff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 4px;
}
.car-date { font-size: 11px; color: #666; margin-bottom: 12px; }

.card-actions { display: flex; gap: 8px; }
.btn-dl {
  flex: 1; padding: 9px 0; border: none; border-radius: 8px;
  background: linear-gradient(135deg, #00e676, #00b0ff);
  color: #000; font-size: 12px; font-weight: 800;
  cursor: pointer; transition: all .2s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.btn-dl:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,230,118,0.35); }
.btn-view {
  padding: 9px 14px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06); color: #aaa;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 5px;
}
.btn-view:hover { background: rgba(255,255,255,0.14); color: #fff; }

/* Empty state */
.empty-state {
  text-align: center; padding: 80px 20px; color: #555;
}
.empty-state .icon { font-size: 60px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; margin-bottom: 20px; }

/* Loading */
.loading {
  text-align: center; padding: 60px;
  color: #666; font-size: 13px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-lg {
  width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #ff6b35; border-radius: 50%;
  animation: spin .8s linear infinite; margin: 0 auto 16px;
}

/* Lightbox */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 92vw; max-height: 88vh; object-fit: contain;
  border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.8);
}
.lightbox-close {
  position: fixed; top: 20px; right: 24px;
  font-size: 32px; color: #fff; cursor: pointer; z-index: 1001;
  background: rgba(0,0,0,0.5); width: 44px; height: 44px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  border: none;
}
.lightbox-dl {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  padding: 13px 36px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, #00e676, #00b0ff);
  color: #000; font-size: 14px; font-weight: 800; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 6px 24px rgba(0,230,118,0.4);
}

/* Refresh btn */
.btn-refresh {
  padding: 10px 18px; border-radius: 10px;
  border: 1px solid rgba(255,107,53,0.4);
  background: rgba(255,107,53,0.1); color: #ff6b35;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-refresh:hover { background: rgba(255,107,53,0.2); }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">CARYANAMS</div>
    <div class="subtitle">PROCESSED CARS GALLERY</div>
  </div>

  <div class="top-bar">
    <div class="gallery-count" id="galleryCount">
      <strong id="totalCount">—</strong> cars processed
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-refresh" onclick="loadGallery()">🔄 Refresh</button>
      <a href="/" class="btn-back">← Back to Processor</a>
    </div>
  </div>

  <div id="galleryContainer">
    <div class="loading">
      <div class="spinner-lg"></div>
      Loading gallery...
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-dl" id="lightboxDl" onclick="lightboxDownload()">⬇️ HD Download</button>
</div>

<script>
let currentDownloadId = null;

async function loadGallery() {
  const container = document.getElementById('galleryContainer');
  container.innerHTML = '<div class="loading"><div class="spinner-lg"></div>Loading...</div>';

  try {
    const r = await fetch('/api/gallery');
    const data = await r.json();

    document.getElementById('totalCount').textContent = data.total || 0;

    if (!data.success || data.cars.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🚗</div>
          <p>Abhi koi processed car nahi hai.<br>Pehle koi car process karo!</p>
          <a href="/" class="btn-back">← Car Process Karo</a>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="gallery-grid" id="galleryGrid"></div>`;
    const grid = document.getElementById('galleryGrid');

    data.cars.forEach(car => {
      const card = document.createElement('div');
      card.className = 'car-card';
      card.innerHTML = `
        <div class="car-img-wrap" onclick="openLightbox('${car.processed_url}','${car.id}')">
          <img src="${car.processed_url}?t=${Date.now()}" alt="${car.filename}" loading="lazy">
          <div class="car-overlay">
            <button class="overlay-btn">🔍 Full View</button>
          </div>
        </div>
        <div class="car-info">
          <div class="car-name">🚗 ${car.filename}</div>
          <div class="car-date">📅 ${car.created_at}</div>
          <div class="card-actions">
            <button class="btn-dl" onclick="hdDownload('${car.id}')">⬇️ HD Download</button>
            <button class="btn-view" onclick="openLightbox('${car.processed_url}','${car.id}')">🔍 View</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });

  } catch(e) {
    container.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>Load nahi ho raha: ${e.message}</p></div>`;
  }
}

function openLightbox(url, carId) {
  document.getElementById('lightboxImg').src = url + '?t=' + Date.now();
  currentDownloadId = carId;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && e.target !== document.querySelector('.lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lightboxDownload() {
  if (currentDownloadId) hdDownload(currentDownloadId);
}

function hdDownload(carId) {
  const a = document.createElement('a');
  a.href = `/api/download/${carId}`;
  a.download = `caryanams_${carId.slice(0,8)}.png`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ESC to close lightbox
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
});

loadGallery();
</script>
</body>
</html>
